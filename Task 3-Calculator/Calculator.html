<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Creative Calculator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
    }

    .calculator{
      width:340px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(15px);
      border-radius:20px;
      padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .display{
      width:100%;
      height:80px;
      border:none;
      outline:none;
      border-radius:12px;
      margin-bottom:20px;
      background:#020617;
      color:#38bdf8;
      text-align:right;
      padding:20px;
      font-size:32px;
      font-weight:bold;
      box-shadow:inset 0 0 10px rgba(0,0,0,0.5);
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
    }

    button{
      height:65px;
      border:none;
      border-radius:15px;
      font-size:22px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
    }

    .number{
      background:#334155;
      color:white;
    }

    .operator{
      background:#38bdf8;
      color:white;
    }

    .equal{
      background:#22c55e;
      color:white;
      grid-column:span 2;
    }

    .clear{
      background:#ef4444;
      color:white;
    }

    .delete{
      background:#f59e0b;
      color:white;
    }

  </style>
</head>

<body>

  <div class="calculator">

    <!-- Display Screen -->

    <input type="text" class="display" id="display" readonly>

    <!-- Buttons -->

    <div class="buttons">

      <button class="clear" onclick="clearDisplay()">AC</button>

      <button class="delete" onclick="deleteLast()">DEL</button>

      <button class="operator" onclick="appendValue('%')">%</button>

      <button class="operator" onclick="appendValue('/')">÷</button>

      <button class="number" onclick="appendValue('7')">7</button>

      <button class="number" onclick="appendValue('8')">8</button>

      <button class="number" onclick="appendValue('9')">9</button>

      <button class="operator" onclick="appendValue('*')">×</button>

      <button class="number" onclick="appendValue('4')">4</button>

      <button class="number" onclick="appendValue('5')">5</button>

      <button class="number" onclick="appendValue('6')">6</button>

      <button class="operator" onclick="appendValue('-')">−</button>

      <button class="number" onclick="appendValue('1')">1</button>

      <button class="number" onclick="appendValue('2')">2</button>

      <button class="number" onclick="appendValue('3')">3</button>

      <button class="operator" onclick="appendValue('+')">+</button>

      <button class="number" onclick="appendValue('0')">0</button>

      <button class="number" onclick="appendValue('.')">.</button>

      <button class="equal" onclick="calculate()">=</button>

    </div>

  </div>

  <script>

    let display = document.getElementById("display");

    // Append values to display

    function appendValue(value){

      display.value += value;

    }

    // Clear display

    function clearDisplay(){

      display.value = "";

    }

    // Delete last character

    function deleteLast(){

      display.value = display.value.slice(0,-1);

    }

    // Calculate result

    function calculate(){

      try{

        display.value = eval(display.value);

      }

      catch(error){

        display.value = "Error";

      }

    }

    // Keyboard Support

    document.addEventListener("keydown", function(event){

      const key = event.key;

      if(
        (key >= '0' && key <= '9') ||
        key === '+' ||
        key === '-' ||
        key === '*' ||
        key === '/' ||
        key === '.' ||
        key === '%'
      ){

        appendValue(key);

      }

      else if(key === "Enter"){

        calculate();

      }

      else if(key === "Backspace"){

        deleteLast();

      }

      else if(key === "Escape"){

        clearDisplay();

      }

    });

  </script>

</body>
</html>
